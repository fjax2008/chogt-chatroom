<!DOCTYPE html>
<html lang="zh">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>中越聊天室</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f23; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

 #loadingOverlay {
 position: fixed; top: 0; left: 0; width: 100%; height: 100%;
 background: #0f0f23; display: flex; flex-direction: column;
 align-items: center; justify-content: center; z-index: 1000;
 transition: opacity 0.5s;
 }
 #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
 .spinner {
 width: 48px; height: 48px; border: 4px solid #333;
 border-top-color: #7b2ff7; border-radius: 50%;
 animation: spin 0.8s linear infinite; margin-bottom: 20px;
 }
 @keyframes spin { to { transform: rotate(360deg); } }
 #loadingText { color: #aaa; font-size: 1rem; text-align: center; line-height: 1.6; }
 #loadingSubtext { color: #666; font-size: 0.85rem; margin-top: 8px; }

 .screen { display: none; width: 100%; max-width: 600px; padding: 20px; }
 .screen.active { display: flex; flex-direction: column; align-items: center; }

 h1 { font-size: 2rem; margin: 40px 0 10px; background: linear-gradient(135deg, #00d2ff, #7b2ff7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
 .subtitle { color: #888; margin-bottom: 30px; font-size: 0.95rem; }

 .card { background: #1a1a3e; border-radius: 16px; padding: 24px; width: 100%; margin-bottom: 16px; }

 label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
 input, select { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #333; background: #0f0f23; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; }
 input:focus, select:focus { border-color: #7b2ff7; }

 .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.2s; margin-top: 8px; }
 .btn:active { transform: scale(0.97); }
 .btn-primary { background: linear-gradient(135deg, #00d2ff, #7b2ff7); color: #fff; }
 .btn-secondary { background: #2a2a5a; color: #ccc; }
 .btn-danger { background: #ff4757; color: #fff; }

 .divider { display: flex; align-items: center; width: 100%; margin: 12px 0; color: #555; font-size: 0.85rem; }
 .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #333; }
 .divider span { padding: 0 12px; }

 .chat-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
 .room-info { font-size: 0.9rem; color: #888; }
 .room-id { font-family: monospace; font-size: 1.2rem; color: #00d2ff; font-weight: bold; cursor: pointer; }
 .room-id:hover::after { content: ' (点击复制)'; font-size: 0.7rem; color: #666; }

 .users-bar { width: 100%; display: flex; gap: 8px; padding: 8px 0; overflow-x: auto; flex-wrap: wrap; }
 .user-tag { background: #2a2a5a; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; white-space: nowrap; }
 .user-tag.me { background: #7b2ff7; }

 .messages { width: 100%; flex: 1; overflow-y: auto; padding: 12px 0; min-height: 300px; max-height: 60vh; }
 .msg { margin-bottom: 12px; animation: fadeIn 0.3s; }
 @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
 .msg .meta { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
 .msg .meta .name { color: #00d2ff; font-weight: 600; }
 .msg .bubble { display: inline-block; padding: 10px 16px; border-radius: 14px; max-width: 85%; word-break: break-word; }
 .msg.mine .bubble { background: #7b2ff7; color: #fff; border-bottom-right-radius: 4px; }
 .msg.other .bubble { background: #2a2a5a; color: #e0e0e0; border-bottom-left-radius: 4px; }
 .msg .translated { font-size: 0.8rem; color: #aaa; margin-top: 4px; font-style: italic; }
 .msg.system { text-align: center; }
 .msg.system .bubble { background: none; color: #666; font-size: 0.85rem; }

 .input-bar { width: 100%; display: flex; gap: 8px; padding: 12px 0; }
 .input-bar input { flex: 1; }
 .input-bar .btn { width: auto; padding: 12px 20px; margin-top: 0; }

 .status { font-size: 0.8rem; padding: 4px 0; }
 .status.connected { color: #2ed573; }
 .status.disconnected { color: #ff4757; }
 .status.connecting { color: #ffa502; }

 @media (max-width: 480px) {
 h1 { font-size: 1.5rem; }
 .card { padding: 16px; }
 }
 </style>
</head>
<body>

<div id="loadingOverlay">
 <div class="spinner"></div>
 <div id="loadingText">正在连接服务器...</div>
 <div id="loadingSubtext">首次加载可能需要 30-60 秒</div>
</div>

<div id="lobby" class="screen">
 <h1>🌐 中越聊天室</h1>
 <p class="subtitle">实时中越翻译 · 轻松跨国聊天</p>

 <div class="card">
 <label>你的昵称（留空随机生成）</label>
 <input type="text" id="username" placeholder="输入昵称..." maxlength="20">
 <div style="margin-top: 14px;">
 <label>你的语言</label>
 <select id="lang">
 <option value="zh">中文</option>
 <option value="vi">Tiếng Việt</option>
 </select>
 </div>
 </div>

 <button class="btn btn-primary" onclick="createRoom()">🏠 创建房间</button>

 <div class="divider"><span>或</span></div>

 <div class="card">
 <label>房间号</label>
 <input type="text" id="roomIdInput" placeholder="输入6位房间号..." maxlength="6" pattern="\d{6}">
 </div>
 <button class="btn btn-secondary" onclick="joinRoom()">🚪 加入房间</button>

 <p id="lobbyError" style="color: #ff4757; margin-top: 12px; font-size: 0.9rem;"></p>
 <p id="connStatus" class="status connecting" style="margin-top: 12px;"></p>
</div>

<div id="chatScreen" class="screen">
 <div class="chat-header">
 <div>
 <div class="room-info">房间号</div>
 <div class="room-id" id="displayRoomId" onclick="copyRoomId()" title="点击复制"></div>
 </div>
 <div>
 <span id="chatConnStatus" class="status connected">● 已连接</span>
 <button class="btn btn-danger" style="width:auto; padding:8px 16px; margin-left:8px; font-size:0.85rem;" onclick="leaveRoom()">退出</button>
 </div>
 </div>

 <div class="users-bar" id="usersBar"></div>

 <div class="messages" id="messages"></div>

 <div class="input-bar">
 <input type="text" id="msgInput" placeholder="输入消息..." maxlength="2000" onkeydown="if(event.key==='Enter')sendMessage()">
 <button class="btn btn-primary" onclick="sendMessage()">发送</button>
 </div>
</div>

<script>
let ws = null;
let myUserId = null;
let myUsername = null;
let myLang = 'zh';
let currentRoomId = null;
let reconnectTimer = null;
let connectStartTime = Date.now();

function getWsUrl() {
 const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
 return proto + '//' + location.host;
}

function showLoading(text, subtext) {
 const overlay = document.getElementById('loadingOverlay');
 overlay.classList.remove('hidden');
 document.getElementById('loadingText').textContent = text || '正在连接服务器...';
 document.getElementById('loadingSubtext').textContent = subtext || '首次加载可能需要 30-60 秒';
}

function hideLoading() {
 document.getElementById('loadingOverlay').classList.add('hidden');
}

function updateLoadingTimer() {
 const elapsed = Math.round((Date.now() - connectStartTime) / 1000);
 const sub = document.getElementById('loadingSubtext');
 if (elapsed > 5 && !document.getElementById('loadingOverlay').classList.contains('hidden')) {
 sub.textContent = '已等待 ' + elapsed + ' 秒，服务器可能正在唤醒...';
 }
}
setInterval(updateLoadingTimer, 1000);

function connect() {
 connectStartTime = Date.now();
 showLoading('正在连接服务器...', '首次加载可能需要 30-60 秒');
 updateConnStatus('connecting');
 ws = new WebSocket(getWsUrl());

 ws.onopen = function() {
 updateConnStatus('connected');
 hideLoading();
 if (currentRoomId) {
 sendWs({ type: 'join-room', roomId: currentRoomId, username: myUsername, lang: myLang });
 }
 };

 ws.onclose = function() {
 updateConnStatus('disconnected');
 if (currentRoomId) {
 showLoading('连接断开', '正在尝试重新连接...');
 }
 reconnectTimer = setTimeout(connect, 3000);
 };

 ws.onerror = function() {
 updateConnStatus('disconnected');
 };

 ws.onmessage = function(e) {
 var msg = JSON.parse(e.data);
 handleMsg(msg);
 };
}

function sendWs(data) {
 if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
}

function updateConnStatus(state) {
 var labels = { connected: '● 已连接', disconnected: '● 已断开', connecting: '● 连接中...' };
 var els = [document.getElementById('connStatus'), document.getElementById('chatConnStatus')];
 els.forEach(function(el) {
 if (el) {
 el.textContent = labels[state] || '';
 el.className = 'status ' + state;
 }
 });
}

function handleMsg(msg) {
 switch (msg.type) {
 case 'room-created':
 myUserId = msg.userId;
 myUsername = msg.username;
 currentRoomId = msg.roomId;
 showChat(msg);
 break;
 case 'room-joined':
 myUserId = msg.userId;
 myUsername = msg.username;
 currentRoomId = msg.roomId;
 showChat(msg);
 break;
 case 'error':
 document.getElementById('lobbyError').textContent = msg.message;
 break;
 case 'message':
 addMessage(msg);
 break;
 case 'user-joined':
 addSystemMsg(msg.username + ' 加入了房间');
 updateUsers(msg.users);
 break;
 case 'user-left':
 addSystemMsg(msg.username + ' 离开了房间');
 updateUsers(msg.users);
 break;
 }
}

function createRoom() {
 if (!ws || ws.readyState !== WebSocket.OPEN) {
 document.getElementById('lobbyError').textContent = '未连接到服务器，请稍候...';
 return;
 }
 var username = document.getElementById('username').value.trim();
 myLang = document.getElementById('lang').value;
 document.getElementById('lobbyError').textContent = '';
 sendWs({ type: 'create-room', username: username, lang: myLang });
}

function joinRoom() {
 if (!ws || ws.readyState !== WebSocket.OPEN) {
 document.getElementById('lobbyError').textContent = '未连接到服务器，请稍候...';
 return;
 }
 var roomId = document.getElementById('roomIdInput').value.trim();
 var username = document.getElementById('username').value.trim();
 myLang = document.getElementById('lang').value;
 document.getElementById('lobbyError').textContent = '';
 if (!roomId || roomId.length !== 6) {
 document.getElementById('lobbyError').textContent = '请输入6位房间号';
 return;
 }
 sendWs({ type: 'join-room', roomId: roomId, username: username, lang: myLang });
}

function showChat(data) {
 document.getElementById('lobby').classList.remove('active');
 document.getElementById('chatScreen').classList.add('active');
 document.getElementById('displayRoomId').textContent = data.roomId;
 updateUsers(data.users);
 document.getElementById('messages').innerHTML = '';
 addSystemMsg('欢迎来到房间 ' + data.roomId + '！');
}

function updateUsers(users) {
 var bar = document.getElementById('usersBar');
 bar.innerHTML = users.map(function(u) {
 return '<span class="user-tag' + (u.id === myUserId ? ' me' : '') + '">' + esc(u.username) + '</span>';
 }).join('');
}

function sendMessage() {
 var input = document.getElementById('msgInput');
 var text = input.value.trim();
 if (!text) return;
 sendWs({ type: 'message', text: text });
 input.value = '';
}

function addMessage(msg) {
 var div = document.getElementById('messages');
 var isMine = msg.userId === myUserId;
 var el = document.createElement('div');
 el.className = 'msg ' + (isMine ? 'mine' : 'other');
 var time = new Date(msg.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
 var translatedHtml = (msg.translated && msg.translated !== msg.original) ? '<div class="translated">💬 ' + esc(msg.translated) + '</div>' : '';
 el.innerHTML = '<div class="meta"><span class="name">' + esc(msg.username) + '</span> · ' + time + '</div>' +
 '<div class="bubble">' + esc(msg.original) + translatedHtml + '</div>';
 div.appendChild(el);
 div.scrollTop = div.scrollHeight;
}

function addSystemMsg(text) {
 var div = document.getElementById('messages');
 var el = document.createElement('div');
 el.className = 'msg system';
 el.innerHTML = '<div class="bubble">' + esc(text) + '</div>';
 div.appendChild(el);
 div.scrollTop = div.scrollHeight;
}

function leaveRoom() {
 currentRoomId = null;
 myUserId = null;
 if (ws) ws.close();
 document.getElementById('chatScreen').classList.remove('active');
 document.getElementById('lobby').classList.add('active');
 connect();
}

function copyRoomId() {
 if (currentRoomId) {
 navigator.clipboard.writeText(currentRoomId).catch(function() {});
 }
}

function esc(s) {
 var d = document.createElement('div');
 d.textContent = s || '';
 return d.innerHTML;
}

document.getElementById('lobby').classList.add('active');
connect();
</script>
</body>
</html>
